spring.application.name=Backend

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/video-conferencing?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=YourSuperSecretKeyThatIsAtLeast32BytesLong!!
app.jwt.expiration-ms=86400000

livekit.api.key=${API_KEY}
livekit.api.secret=${API_SECRET}
livekit.url=${API_URL}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Recording output directory ---
# This must match the Docker volume mount in LiveKit/docker-compose.yml
# Egress container writes to /recordings → Docker mounts to this host path
recording.output.dir=D:/Java_Full_Stack/video conferencing/LiveKit/recordings

# --- Gemini AI ---
gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# --- Whisper transcription ---
# For local development (Windows): Use absolute paths
# For production (Linux/Render): Use 'python3' and relative paths
whisper.command=${WHISPER_COMMAND:python3 AI/transcribe.py --input "%s" --model base --device cpu --compute_type int8}

# --- Multipart file upload (for browser recording) ---
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB


